<!DOCTYPE html>
<html lang="en" class="scroll-smooth bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akshay MP | AI Architect</title>
    
    <!-- Premium Fonts: Plus Jakarta Sans & Playfair Display -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        zinc: {
                            850: '#1f1f22',
                            900: '#18181b',
                            950: '#0a0a0c',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #000000; color: #fafafa; }
        ::selection { background-color: #fafafa; color: #000000; }
        .glass-nav { background: rgba(10, 10, 12, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    </style>
</head>
<body class="font-sans antialiased overflow-x-hidden selection:bg-white selection:text-black relative">
    
    <!-- Changed fixed to absolute: Navbar now stays only at the top and scrolls away -->
    <nav class="absolute top-8 right-8 z-50 glass-nav px-8 py-4 rounded-full border border-zinc-800/50 shadow-2xl">
        <ul class="flex space-x-8 text-sm font-medium tracking-wide text-zinc-400">
            <li><a href="/#home" class="hover:text-white transition-colors duration-300">Home</a></li>
            <li><a href="/#projects" class="hover:text-white transition-colors duration-300">Projects</a></li>
            <li><a href="/#bio" class="hover:text-white transition-colors duration-300">Bio</a></li>
            <li><a href="/#contact" class="hover:text-white transition-colors duration-300">Connect</a></li>
        </ul>
    </nav>

    <main class="selection:bg-zinc-800 relative z-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-12 text-center text-zinc-600 text-sm border-t border-zinc-900 mt-32 relative z-10">
        <p>&copy; 2026 Akshay MP. Designed for excellence.</p>
    </footer>

    <script src="/static/js/animations.js"></script>
</body>
</html>
